<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Avançado</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/container.css">
    <link rel="stylesheet" href="../css/list.css">
    <link rel="stylesheet" href="../css/toolbar.css">
    
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <script type="module" src="../js/events.js" defer></script>
    
</head>
<body>
    <section class="todo-container">
        <header>
            <h1>Todo Avançado</h1>
        </header>
        <form id="todo-form">
            <p>Adicione a sua tarefa:</p>
            <div class="form-control">
                <input type="text" id="todo-input" placeholder="O que você vai fazer ?" autocomplete="off">
                <button type="submit">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>
        </form>
        <form id="edit-form" class="hide">
            <p>Edite sua tarefa:</p>
            <div class="form-control">
                <input type="text" id="edit-input" autocomplete="off">
                <button type="submit">
                    <i class="bi bi-check-all"></i>
                </button>
            </div>
            <button id="cancel-edit-btn">Cancelar</button>
        </form>
        <section id="toolbar">
            <div id="search">
                <h4>Pesquisar:</h4>
                <div>
                    <input type="text" id="search-input" placeholder="Buscar" autocomplete="off">     
                </div>
            </div>
            <div id="filter">
                <h4>Filtrar:</h4>
                <select id="filter-select">
                    <option value="">-- selecione --</option>
                    <option value="all">Todos</option>
                    <option value="done">Feitos</option>
                    <option value="todo">A fazer</option>
                </select>
            </div>
        </section>
        <section id="todo-list"></section>
    </section>
</body>
</html>
